server:
  port: 8080

spring:
  application:
    name: sentientops-ai

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:sentientops}
    username: ${POSTGRES_USER:sentientops}
    password: ${POSTGRES_PASSWORD:sentientops}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:neo4j}

app:
  jwt:
    secret: ${JWT_SECRET:c2VudGllbnRvcHMtYWktc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tc3VwZXItc2VjdXJl}
    expiration-ms: 86400000

  groq:
    api-key: ${GROQ_API_KEY:}
    api-url: https://api.groq.com/openai/v1/chat/completions
    model: llama3-8b-8192

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sentientops: INFO
    org.springframework.security: WARN
