apiVersion: v1
kind: Service
metadata:
  name: sentientops-ai
  labels:
    app: sentientops-ai
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: sentientops-ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentientops-config
data:
  postgres-host: "postgres-service"
  postgres-db: "sentientops"
  neo4j-uri: "bolt://neo4j-service:7687"
---
apiVersion: v1
kind: Secret
metadata:
  name: sentientops-secrets
type: Opaque
stringData:
  postgres-user: "sentientops"
  postgres-password: "CHANGE_ME"
  neo4j-user: "neo4j"
  neo4j-password: "CHANGE_ME"
  groq-api-key: "CHANGE_ME"
  jwt-secret: "CHANGE_ME_BASE64_ENCODED"
